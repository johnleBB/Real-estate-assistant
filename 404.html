<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <!-- Instant redirect for browsers with JS disabled -->
  <meta http-equiv="refresh" content="0; url=https://johnlebb.github.io/Real-estate-assistant/">
  <link rel="canonical" href="https://johnlebb.github.io/Real-estate-assistant/">
  <script>
    // Faster redirect for everyone else. Use replace() so the broken URL
    // doesn't end up in the browser's back-button history.
    window.location.replace("https://johnlebb.github.io/Real-estate-assistant/");
  </script>
</head>
<body>
  <p>This page has moved. If you are not redirected automatically, <a href="https://johnlebb.github.io/Real-estate-assistant/">click here</a>.</p>
</body>
</html>
